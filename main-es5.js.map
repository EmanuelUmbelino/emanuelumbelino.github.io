module.exports = "<div style=\"padding: 25px;\">\r\n    <mat-card style=\"margin: auto;\">\r\n        <div>\r\n            <mat-form-field appearance=\"outline\" style=\"width: 100%;\">\r\n                <mat-label>Nome</mat-label>\r\n                <input matInput placeholder=\"Placeholder\" [(ngModel)]=\"nome\">\r\n            </mat-form-field>\r\n            <button mat-raised-button color=\"primary\" (click)=\"calcularLetras(nome)\">Calcular</button>\r\n        </div>\r\n        <br>\r\n        <div *ngFor=\"let v of valores\">\r\n            {{v.letra}} -> {{v.numero}}\r\n        </div>\r\n        <br><br>\r\n        <div *ngIf=\"final !== undefined\">\r\n            Total\r\n            <br>\r\n            {{final.numero}} -> {{final.soma}}\r\n        </div>\r\n    </mat-card>\r\n</div>"
